<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Swarm Cover Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  body { background: #060612; color: #fff; font-family: 'Orbitron', sans-serif; text-align: center; padding: 20px; }
  canvas { display: block; margin: 20px auto; border: 1px solid #1a1a3a; cursor: pointer; max-width: 90vw; border-radius: 8px; }
  h2 { color: #a78bfa; margin-top: 40px; font-size: 16px; letter-spacing: 3px; }
  p { color: #64748b; font-size: 13px; }
  .note { color: #22d3ee; font-size: 14px; margin-bottom: 30px; letter-spacing: 2px; }
  .dl-btn { display: inline-block; margin: 8px; padding: 12px 28px; background: linear-gradient(135deg,#7c3aed,#a78bfa);
    color: #fff; font-weight: 700; border: none; cursor: pointer; font-family: 'Orbitron', sans-serif;
    font-size: 12px; letter-spacing: 2px; border-radius: 8px; transition: all .2s; }
  .dl-btn:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(167,139,250,0.5); }
</style>
</head>
<body>
<h1 style="letter-spacing:4px;color:#22d3ee;font-size:24px">NEON SWARM — COVER GENERATOR</h1>
<p class="note">Click each canvas or use the download buttons</p>

<h2>LANDSCAPE 16:9 (1920 × 1080)</h2>
<canvas id="landscape" width="1920" height="1080"></canvas>
<button class="dl-btn" onclick="dl('landscape')">DOWNLOAD LANDSCAPE</button>

<h2>PORTRAIT 2:3 (800 × 1200)</h2>
<canvas id="portrait" width="800" height="1200"></canvas>
<button class="dl-btn" onclick="dl('portrait')">DOWNLOAD PORTRAIT</button>

<h2>SQUARE 1:1 (800 × 800)</h2>
<canvas id="square" width="800" height="800"></canvas>
<button class="dl-btn" onclick="dl('square')">DOWNLOAD SQUARE</button>

<script>
function dl(id) {
  const c = document.getElementById(id);
  const a = document.createElement('a');
  a.download = 'neon-swarm-' + id + '.png';
  a.href = c.toDataURL('image/png');
  a.click();
}

document.fonts.ready.then(() => {
  drawCover('landscape');
  drawCover('portrait');
  drawCover('square');
});

function drawCover(canvasId) {
  const cvs = document.getElementById(canvasId);
  const ctx = cvs.getContext('2d');
  const W = cvs.width, H = cvs.height;
  const S = Math.min(W, H) / 800;
  const isPortrait = H > W;
  const isSquare = Math.abs(W - H) < 50;

  /* ═══════════════════════════════════════
     1. RICH GRADIENT BACKGROUND
     ═══════════════════════════════════════ */
  // Base dark fill
  ctx.fillStyle = '#05050f';
  ctx.fillRect(0, 0, W, H);

  // Central radial: deep purple/blue nebula
  const nebula = ctx.createRadialGradient(W*0.5, H*0.55, 0, W*0.5, H*0.55, Math.max(W,H)*0.7);
  nebula.addColorStop(0, '#2d1b69');
  nebula.addColorStop(0.3, '#1a0a4a');
  nebula.addColorStop(0.6, '#0c0525');
  nebula.addColorStop(1, '#030010');
  ctx.fillStyle = nebula;
  ctx.fillRect(0, 0, W, H);

  // Accent glow — cyan from top-left
  const accentTL = ctx.createRadialGradient(W*0.2, H*0.15, 0, W*0.2, H*0.15, W*0.5);
  accentTL.addColorStop(0, 'rgba(34,211,238,0.12)');
  accentTL.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = accentTL;
  ctx.fillRect(0, 0, W, H);

  // Accent glow — magenta from bottom-right
  const accentBR = ctx.createRadialGradient(W*0.8, H*0.85, 0, W*0.8, H*0.85, W*0.45);
  accentBR.addColorStop(0, 'rgba(244,114,182,0.1)');
  accentBR.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = accentBR;
  ctx.fillRect(0, 0, W, H);

  /* ═══════════════════════════════════════
     2. SCATTERED STARS
     ═══════════════════════════════════════ */
  for (let i = 0; i < 80; i++) {
    const sx = (Math.sin(i * 127.1 + 311.7) * 0.5 + 0.5) * W;
    const sy = (Math.sin(i * 269.5 + 183.3) * 0.5 + 0.5) * H;
    const sr = (Math.sin(i * 41.3) * 0.5 + 0.5) * 1.8 * S + 0.3 * S;
    const sa = (Math.sin(i * 73.7) * 0.5 + 0.5) * 0.4 + 0.1;
    ctx.save();
    ctx.globalAlpha = sa;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  /* ═══════════════════════════════════════
     3. PLAYER CHARACTER — BIG, CENTER, HEROIC
     ═══════════════════════════════════════ */
  const playerR = (isPortrait ? 90 : 80) * S;
  const pcx = W * 0.5;
  const pcy = isPortrait ? H * 0.48 : H * 0.52;

  // Massive ambient glow (very soft, spreads far)
  for (let g = 3; g >= 1; g--) {
    ctx.save();
    const glowR = playerR * (1.5 + g * 1.2);
    const glow = ctx.createRadialGradient(pcx, pcy, 0, pcx, pcy, glowR);
    glow.addColorStop(0, `rgba(34,211,238,${0.08 / g})`);
    glow.addColorStop(0.5, `rgba(139,92,246,${0.04 / g})`);
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  // Energy ring (spinning orbit trail)
  ctx.save();
  ctx.strokeStyle = 'rgba(34,211,238,0.15)';
  ctx.lineWidth = 2.5 * S;
  ctx.setLineDash([12 * S, 8 * S]);
  ctx.beginPath(); ctx.arc(pcx, pcy, playerR * 1.8, 0, Math.PI * 2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Orbiting weapon dots on the ring
  for (let i = 0; i < 5; i++) {
    const a = (Math.PI * 2 / 5) * i - 0.3;
    const ox = pcx + Math.cos(a) * playerR * 1.8;
    const oy = pcy + Math.sin(a) * playerR * 1.8;
    ctx.save();
    ctx.fillStyle = '#fbbf24';
    ctx.shadowColor = '#fbbf24';
    ctx.shadowBlur = 10 * S;
    ctx.beginPath(); ctx.arc(ox, oy, 5 * S, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Player outer glow ring
  ctx.save();
  ctx.shadowColor = '#22d3ee';
  ctx.shadowBlur = 60 * S;
  ctx.strokeStyle = 'rgba(34,211,238,0.3)';
  ctx.lineWidth = 3 * S;
  ctx.beginPath(); ctx.arc(pcx, pcy, playerR * 1.15, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();

  // Player body — gradient sphere
  const bodyG = ctx.createRadialGradient(pcx - playerR*0.2, pcy - playerR*0.25, 0, pcx, pcy, playerR);
  bodyG.addColorStop(0, '#ffffff');
  bodyG.addColorStop(0.15, '#d4f7ff');
  bodyG.addColorStop(0.4, '#22d3ee');
  bodyG.addColorStop(0.7, '#0891b2');
  bodyG.addColorStop(1, '#065666');
  ctx.save();
  ctx.shadowColor = '#22d3ee';
  ctx.shadowBlur = 40 * S;
  ctx.fillStyle = bodyG;
  ctx.beginPath(); ctx.arc(pcx, pcy, playerR, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // Player inner highlight
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 20 * S;
  ctx.beginPath(); ctx.arc(pcx - playerR*0.15, pcy - playerR*0.2, playerR * 0.18, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // Player bright core
  ctx.save();
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 15 * S;
  ctx.beginPath(); ctx.arc(pcx, pcy, playerR * 0.08, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  /* ═══════════════════════════════════════
     4. ENEMY SWARM — FEW, DRAMATIC, CLEAN
     ═══════════════════════════════════════ */
  const enemies = [
    // [angle offset, distance factor, size, color, shape]
    // shape: 0=circle, 1=diamond, 2=triangle
    { a: -0.4,  d: 2.8, s: 30, c: '#ff004c', sh: 0 },
    { a:  0.5,  d: 3.2, s: 24, c: '#ff6600', sh: 1 },
    { a:  1.2,  d: 2.6, s: 34, c: '#ff00ff', sh: 2 },
    { a:  2.0,  d: 3.1, s: 20, c: '#ffcc00', sh: 0 },
    { a:  2.8,  d: 2.9, s: 28, c: '#ff3366', sh: 1 },
    { a:  3.6,  d: 3.4, s: 22, c: '#cc00ff', sh: 2 },
    { a:  4.3,  d: 2.5, s: 32, c: '#ff004c', sh: 0 },
    { a:  5.1,  d: 3.0, s: 26, c: '#ff6600', sh: 1 },
  ];

  enemies.forEach(e => {
    const ex = pcx + Math.cos(e.a) * playerR * e.d;
    const ey = pcy + Math.sin(e.a) * playerR * e.d;
    const er = e.s * S;

    // Only draw if on canvas (with some margin)
    if (ex < -er*2 || ex > W+er*2 || ey < -er*2 || ey > H+er*2) return;

    // Glow trail pointing towards player
    ctx.save();
    const trailG = ctx.createRadialGradient(ex, ey, er*0.5, ex, ey, er*3);
    trailG.addColorStop(0, e.c + '40');
    trailG.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = trailG;
    ctx.fillRect(ex - er*3, ey - er*3, er*6, er*6);
    ctx.restore();

    // Enemy body
    ctx.save();
    ctx.fillStyle = e.c;
    ctx.shadowColor = e.c;
    ctx.shadowBlur = 20 * S;
    drawEnemyShape(ctx, ex, ey, er, e.sh);
    ctx.restore();

    // Enemy highlight
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#fff';
    drawEnemyShape(ctx, ex - er*0.15, ey - er*0.2, er * 0.3, e.sh);
    ctx.restore();
  });

  /* ═══════════════════════════════════════
     5. ENERGY BEAMS from player (2 dramatic ones)
     ═══════════════════════════════════════ */
  const beamAngles = [-0.8, 2.3];
  beamAngles.forEach(ba => {
    const len = playerR * 4;
    const bx2 = pcx + Math.cos(ba) * len;
    const by2 = pcy + Math.sin(ba) * len;
    ctx.save();
    const beamG = ctx.createLinearGradient(pcx, pcy, bx2, by2);
    beamG.addColorStop(0, 'rgba(34,211,238,0.6)');
    beamG.addColorStop(0.3, 'rgba(34,211,238,0.25)');
    beamG.addColorStop(1, 'rgba(34,211,238,0)');
    ctx.strokeStyle = beamG;
    ctx.lineWidth = 4 * S;
    ctx.shadowColor = '#22d3ee';
    ctx.shadowBlur = 15 * S;
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(pcx, pcy); ctx.lineTo(bx2, by2); ctx.stroke();
    // Thinner core beam
    ctx.lineWidth = 1.5 * S;
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.moveTo(pcx, pcy); ctx.lineTo(bx2, by2); ctx.stroke();
    ctx.restore();
  });

  /* ═══════════════════════════════════════
     6. VIGNETTE — clean edges
     ═══════════════════════════════════════ */
  const vig = ctx.createRadialGradient(W/2, H*0.5, Math.min(W,H)*0.2, W/2, H*0.5, Math.max(W,H)*0.72);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(3,0,16,0.7)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  /* ═══════════════════════════════════════
     7. TITLE — "NEON SWARM" — BIG, BOLD, STYLIZED
     ═══════════════════════════════════════ */
  const titleY = isPortrait ? H * 0.13 : H * 0.18;
  const neonSize = Math.floor((isPortrait ? 65 : isSquare ? 80 : 100) * S);
  const swarmSize = Math.floor(neonSize * 1.1);

  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Draw "NEON" word
  const neonY = titleY - neonSize * 0.35;
  ctx.font = '900 ' + neonSize + 'px Orbitron, sans-serif';

  // Wide glow behind text
  ctx.shadowColor = '#22d3ee';
  ctx.shadowBlur = 60 * S;
  ctx.fillStyle = 'rgba(34,211,238,0.2)';
  ctx.fillText('NEON', W/2, neonY);
  ctx.fillText('NEON', W/2, neonY);

  // NEON text — gradient fill
  const neonGrad = ctx.createLinearGradient(W/2 - neonSize*2, neonY, W/2 + neonSize*2, neonY);
  neonGrad.addColorStop(0, '#22d3ee');
  neonGrad.addColorStop(0.5, '#67e8f9');
  neonGrad.addColorStop(1, '#22d3ee');
  ctx.shadowBlur = 30 * S;
  ctx.fillStyle = neonGrad;
  ctx.fillText('NEON', W/2, neonY);

  // Bright center pass
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 5 * S;
  ctx.globalAlpha = 0.4;
  ctx.fillStyle = '#fff';
  ctx.fillText('NEON', W/2, neonY);
  ctx.globalAlpha = 1;

  // Draw "SWARM" word — slightly bigger, warmer color
  const swarmY = titleY + swarmSize * 0.4;
  ctx.font = '900 ' + swarmSize + 'px Orbitron, sans-serif';

  // Wide glow
  ctx.shadowColor = '#a78bfa';
  ctx.shadowBlur = 60 * S;
  ctx.fillStyle = 'rgba(167,139,250,0.15)';
  ctx.fillText('SWARM', W/2, swarmY);
  ctx.fillText('SWARM', W/2, swarmY);

  // SWARM text — gradient fill (purple to pink)
  const swarmGrad = ctx.createLinearGradient(W/2 - swarmSize*2, swarmY, W/2 + swarmSize*2, swarmY);
  swarmGrad.addColorStop(0, '#a78bfa');
  swarmGrad.addColorStop(0.3, '#c084fc');
  swarmGrad.addColorStop(0.7, '#f472b6');
  swarmGrad.addColorStop(1, '#a78bfa');
  ctx.shadowColor = '#a78bfa';
  ctx.shadowBlur = 25 * S;
  ctx.fillStyle = swarmGrad;
  ctx.fillText('SWARM', W/2, swarmY);

  // Bright pass
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 4 * S;
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#fff';
  ctx.fillText('SWARM', W/2, swarmY);
  ctx.globalAlpha = 1;

  // Thin underline accent
  const ulW = swarmSize * 2.5;
  const ulY = swarmY + swarmSize * 0.55;
  const ulG = ctx.createLinearGradient(W/2 - ulW/2, 0, W/2 + ulW/2, 0);
  ulG.addColorStop(0, 'rgba(34,211,238,0)');
  ulG.addColorStop(0.2, 'rgba(34,211,238,0.6)');
  ulG.addColorStop(0.5, 'rgba(167,139,250,0.8)');
  ulG.addColorStop(0.8, 'rgba(244,114,182,0.6)');
  ulG.addColorStop(1, 'rgba(244,114,182,0)');
  ctx.strokeStyle = ulG;
  ctx.lineWidth = 2.5 * S;
  ctx.shadowColor = '#a78bfa';
  ctx.shadowBlur = 10 * S;
  ctx.beginPath();
  ctx.moveTo(W/2 - ulW/2, ulY);
  ctx.lineTo(W/2 + ulW/2, ulY);
  ctx.stroke();

  ctx.restore();

  /* ═══════════════════════════════════════
     8. EDGE FADE (soft cinematic bars)
     ═══════════════════════════════════════ */
  // Top fade
  const tf = ctx.createLinearGradient(0, 0, 0, H * 0.06);
  tf.addColorStop(0, 'rgba(3,0,16,0.6)');
  tf.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = tf;
  ctx.fillRect(0, 0, W, H * 0.06);

  // Bottom fade
  const bf = ctx.createLinearGradient(0, H * 0.94, 0, H);
  bf.addColorStop(0, 'rgba(0,0,0,0)');
  bf.addColorStop(1, 'rgba(3,0,16,0.6)');
  ctx.fillStyle = bf;
  ctx.fillRect(0, H * 0.94, W, H * 0.06);

  cvs.onclick = () => dl(canvasId);
}

/* ── Enemy shape helper ── */
function drawEnemyShape(ctx, x, y, r, shape) {
  if (shape === 0) {
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  } else if (shape === 1) {
    ctx.beginPath();
    ctx.moveTo(x, y - r * 1.2); ctx.lineTo(x + r, y);
    ctx.lineTo(x, y + r * 1.2); ctx.lineTo(x - r, y);
    ctx.closePath(); ctx.fill();
  } else {
    ctx.beginPath();
    ctx.moveTo(x, y - r);
    ctx.lineTo(x + r * 0.87, y + r * 0.5);
    ctx.lineTo(x - r * 0.87, y + r * 0.5);
    ctx.closePath(); ctx.fill();
  }
}
</script>
</body>
</html>
