<?xml version="1.0" encoding="UTF-8"?>
<svg width="2000" height="500" viewBox="0 0 2000 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05050d"/>
      <stop offset="55%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#070712"/>
    </linearGradient>
    <radialGradient id="nebulaA" cx="18%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#22d3ee" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaB" cx="70%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.16"/>
      <stop offset="60%" stop-color="#a78bfa" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#67e8f9" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="2000" height="500" fill="url(#bg)"/>
  <rect width="2000" height="500" fill="url(#nebulaA)"/>
  <rect width="2000" height="500" fill="url(#nebulaB)"/>

  <!-- Grid -->
  <g stroke="#22d3ee" stroke-opacity="0.07" stroke-width="1">
    <path d="M0 100 H2000"/>
    <path d="M0 200 H2000"/>
    <path d="M0 300 H2000"/>
    <path d="M0 400 H2000"/>
    <path d="M200 0 V500"/>
    <path d="M400 0 V500"/>
    <path d="M600 0 V500"/>
    <path d="M800 0 V500"/>
    <path d="M1000 0 V500"/>
    <path d="M1200 0 V500"/>
    <path d="M1400 0 V500"/>
    <path d="M1600 0 V500"/>
    <path d="M1800 0 V500"/>
  </g>

  <!-- Stars -->
  <g fill="#ffffff" fill-opacity="0.65">
    <circle cx="140" cy="90" r="2"/>
    <circle cx="320" cy="150" r="1.5"/>
    <circle cx="560" cy="80" r="1.2"/>
    <circle cx="780" cy="220" r="1.3"/>
    <circle cx="980" cy="120" r="1.6"/>
    <circle cx="1240" cy="90" r="1.2"/>
    <circle cx="1480" cy="160" r="1.4"/>
    <circle cx="1720" cy="110" r="1.2"/>
    <circle cx="1820" cy="300" r="1.4"/>
    <circle cx="220" cy="330" r="1.2"/>
    <circle cx="420" cy="300" r="1.1"/>
    <circle cx="660" cy="360" r="1.4"/>
    <circle cx="920" cy="340" r="1.2"/>
    <circle cx="1140" cy="320" r="1.5"/>
    <circle cx="1400" cy="370" r="1.2"/>
    <circle cx="1640" cy="420" r="1.4"/>
  </g>

  <!-- Title -->
  <text x="1000" y="110" font-family="Orbitron, Arial, sans-serif" font-size="88" font-weight="900" letter-spacing="6" text-anchor="middle" fill="#9bf3ff">NEON SWARM</text>

  <!-- Core + orbiters -->
  <g transform="translate(1000 265)">
    <circle r="140" fill="url(#coreGlow)"/>
    <circle r="48" fill="#22d3ee"/>
    <circle r="20" fill="#ffffff"/>
    <circle r="10" fill="#05050d"/>

    <!-- Lightning arms -->
    <g stroke="#22d3ee" stroke-width="3" stroke-linecap="round" stroke-opacity="0.9">
      <path d="M0 -20 L40 -60 L70 -50"/>
      <path d="M0 -10 L-50 -40 L-80 -30"/>
      <path d="M10 0 L60 20 L90 30"/>
      <path d="M-10 10 L-50 30 L-80 40"/>
    </g>

    <!-- Orbiting dots -->
    <g fill="#d9f99d">
      <circle cx="0" cy="-55" r="6"/>
      <circle cx="50" cy="0" r="6"/>
      <circle cx="0" cy="55" r="6"/>
      <circle cx="-50" cy="0" r="6"/>
    </g>
  </g>

  <!-- Colorful enemy shapes -->
  <g>
    <circle cx="820" cy="165" r="16" fill="#f472b6"/>
    <circle cx="910" cy="220" r="14" fill="#f472b6"/>
    <circle cx="1180" cy="190" r="16" fill="#fbbf24"/>
    <circle cx="760" cy="290" r="14" fill="#f97316"/>
    <circle cx="1260" cy="285" r="16" fill="#22d3ee"/>

    <rect x="1080" y="170" width="22" height="22" fill="#f472b6" transform="rotate(45 1091 181)"/>
    <rect x="1320" y="210" width="22" height="22" fill="#f472b6" transform="rotate(45 1331 221)"/>
    <rect x="930" y="320" width="22" height="22" fill="#a78bfa" transform="rotate(45 941 331)"/>
    <rect x="1120" y="330" width="22" height="22" fill="#f472b6" transform="rotate(45 1131 341)"/>

    <polygon points="900,140 920,175 880,175" fill="#ef4444"/>
    <polygon points="1220,140 1240,175 1200,175" fill="#fbbf24"/>
    <polygon points="1260,360 1280,395 1240,395" fill="#f472b6"/>
    <polygon points="840,360 860,395 820,395" fill="#f97316"/>

    <circle cx="1020" cy="215" r="8" fill="#f472b6"/>
    <circle cx="980" cy="285" r="7" fill="#a78bfa"/>
    <circle cx="1180" cy="315" r="7" fill="#f97316"/>
  </g>

  <!-- Extra small sparkles -->
  <g fill="#22d3ee" fill-opacity="0.9">
    <rect x="710" y="210" width="6" height="6" transform="rotate(45 713 213)"/>
    <rect x="1360" y="270" width="6" height="6" transform="rotate(45 1363 273)"/>
    <rect x="1210" y="245" width="6" height="6" transform="rotate(45 1213 248)"/>
  </g>
</svg>
